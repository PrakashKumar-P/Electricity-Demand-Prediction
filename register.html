<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Nexus Energy | Register</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 20% 30%, #93c09a, #7dc03e);
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg,
          rgba(59, 201, 255, 0.08) 0px,
          rgba(59, 201, 255, 0.08) 2px,
          transparent 2px,
          transparent 30px);
      animation: moveBg 20s linear infinite;
      opacity: 0.5;
    }

    @keyframes moveBg {
      from {
        transform: translate(-10%, -10%) rotate(0deg);
      }

      to {
        transform: translate(10%, 10%) rotate(5deg);
      }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: rgba(59, 201, 255, 0.2);
      border-radius: 50%;
      animation: floatParticle 12s infinite ease-in-out;
    }

    @keyframes floatParticle {

      0%,
      100% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }

      20% {
        opacity: 0.6;
      }

      80% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-100px) translateX(50px);
        opacity: 0;
      }
    }

    /* Register Box */
    .register-box {
      position: relative;
      width: 420px;
      max-width: 90%;
      padding: 2rem;
      background: rgba(12, 22, 35, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(59, 201, 255, 0.4);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.2);
      z-index: 10;
      transition: all 0.3s ease;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
        border-color: rgba(59, 201, 255, 0.4);
      }

      50% {
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 35px rgba(0, 255, 255, 0.5);
        border-color: rgba(59, 201, 255, 0.7);
      }
    }

    .register-box:hover {
      transform: translateY(-5px);
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .brand i {
      font-size: 2.5rem;
      color: #3bc9ff;
      filter: drop-shadow(0 0 10px rgba(59, 201, 255, 0.5));
      animation: iconPulse 2s ease-in-out infinite;
    }

    @keyframes iconPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .brand h2 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #9bd4ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-top: 0.3rem;
    }

    .brand p {
      font-size: 0.7rem;
      color: #8aadcf;
      margin-top: 0.2rem;
    }

    /* Form Groups */
    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid rgba(59, 201, 255, 0.3);
      outline: none;
      border-radius: 1rem;
      background: rgba(0, 0, 0, 0.5);
      color: #eef5ff;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      border-color: #3bc9ff;
      box-shadow: 0 0 15px rgba(59, 201, 255, 0.3);
      background: rgba(0, 0, 0, 0.7);
    }

    .input-group input::placeholder {
      color: #6f9bcb;
    }

    /* Live Validation Messages */
    .live-msg {
      font-size: 0.7rem;
      margin-top: 0.3rem;
      margin-left: 0.5rem;
      min-height: 18px;
      font-weight: 500;
    }

    .live-error {
      color: #ff7a5c;
      text-shadow: 0 0 5px rgba(255, 70, 50, 0.3);
    }

    .live-ok {
      color: #4cd964;
      text-shadow: 0 0 5px rgba(76, 217, 100, 0.3);
    }

    /* Buttons */
    .btn-primary,
    .btn-secondary {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 3rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(105deg, #0b2a42, #0a1a2c);
      color: white;
      border: 1px solid #3bc9ff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 201, 255, 0.4);
      border-color: #7ad6ff;
    }

    .btn-secondary {
      background: rgba(8, 20, 30, 0.8);
      color: #8acdff;
      border: 1px solid rgba(59, 201, 255, 0.5);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(59, 201, 255, 0.15);
      border-color: #3bc9ff;
    }

    .btn-primary:active,
    .btn-secondary:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      margin: 1.2rem 0;
      text-align: center;
      position: relative;
      color: #6f9bcb;
      font-size: 0.7rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(59, 201, 255, 0.2);
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    /* Login Link */
    .login-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #8aadcf;
    }

    .login-link a {
      color: #3bc9ff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .login-link a:hover {
      text-decoration: underline;
      color: #7ad6ff;
    }

    /* Message Alert */
    .message {
      margin-top: 1rem;
      text-align: center;
      font-weight: 500;
      padding: 0.7rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .message.error {
      color: #ff7a5c;
      background: rgba(255, 70, 50, 0.15);
      border: 1px solid rgba(255, 70, 50, 0.4);
      animation: shake 0.4s ease;
    }

    .message.success {
      color: #4cd964;
      background: rgba(76, 217, 100, 0.1);
      border: 1px solid rgba(76, 217, 100, 0.3);
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    /* Loading State for Buttons */
    .btn-primary.loading,
    .btn-secondary.loading {
      opacity: 0.7;
      cursor: wait;
    }

    .btn-primary.loading i,
    .btn-secondary.loading i {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Spark Effect */
    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #3bc9ff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      animation: sparkMove 1s ease-out forwards;
    }

    @keyframes sparkMove {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-60px) scale(0);
        opacity: 0;
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .register-box {
        padding: 1.5rem;
      }

      .brand h2 {
        font-size: 1.4rem;
      }

      .brand i {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <div class="register-box">
    <div class="brand">
      <i class="fas fa-user-plus" style="color: yellow;"></i>
      <h2>Create Account</h2>
      <p> Energy Platform</p>
    </div>

    <!-- SEND OTP FORM -->
    <form method="POST" id="sendOtpForm">
      <input type="hidden" name="action" value="send_otp">

      <div class="input-group">
        <input type="text" id="username" name="username" placeholder="Username" value="{{ username_value }}" required
          autocomplete="off">
        <div id="username-status" class="live-msg"></div>
      </div>

      <div class="input-group">
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <div class="input-group">
        <input type="tel" id="phone" name="phone" placeholder="Mobile Number" value="{{ phone_value }}" required>
        <div id="phone-status" class="live-msg"></div>
      </div>

      <button type="submit" class="btn-primary" id="sendOtpBtn">
        <i class="fas fa-paper-plane"></i> Request Admin Approval
      </button>
    </form>

    <div class="divider">OR</div>

    <!-- VERIFY OTP FORM -->
    <form method="POST" id="verifyOtpForm">
      <input type="hidden" name="action" value="verify_otp">

      <div class="input-group">
        <input type="text" name="otp" placeholder="Enter OTP Code" required maxlength="6">
      </div>

      <button type="submit" class="btn-secondary" id="verifyBtn">
        <i class="fas fa-check-circle"></i> Verify & Complete Registration
      </button>
    </form>

    <div class="login-link">
      Already have an account? <a href="/">Sign In →</a>
    </div>

    {% if message %}
    <div
      class="message {% if 'Successful' in message %}success{% elif 'exists' in message or 'Invalid' in message or 'expired' in message %}error{% else %}error{% endif %}">
      <i class="fas {% if 'Successful' in message %}fa-check-circle{% else %}fa-exclamation-triangle{% endif %}"></i>
      {{ message }}
    </div>
    {% endif %}
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
  <script>
    // Create floating particles
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;

      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        const size = Math.random() * 4 + 1;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = Math.random() * 12 + 8 + 's';
        container.appendChild(particle);
      }
    }

    // Spark effect on mouse move
    let lastTime = 0;
    document.addEventListener("mousemove", (e) => {
      const now = Date.now();
      if (now - lastTime < 30) return;
      lastTime = now;

      const spark = document.createElement("div");
      spark.className = "spark";
      spark.style.left = e.clientX + "px";
      spark.style.top = e.clientY + "px";

      const size = Math.random() * 6 + 2;
      spark.style.width = size + "px";
      spark.style.height = size + "px";
      spark.style.boxShadow = "0 0 10px rgba(59, 201, 255, 0.8), 0 0 20px rgba(59, 201, 255, 0.5)";

      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 800);
    });

    // Live validation for username and phone
    const usernameInput = document.getElementById("username");
    const phoneInput = document.getElementById("phone");
    const userStatus = document.getElementById("username-status");
    const phoneStatus = document.getElementById("phone-status");

    let userTimer, phoneTimer;

    if (usernameInput) {
      usernameInput.addEventListener("input", () => {
        clearTimeout(userTimer);
        userTimer = setTimeout(() => {
          const value = usernameInput.value.trim();
          if (value.length < 3) {
            userStatus.innerText = "";
            return;
          }

          fetch(`/check_user?username=${encodeURIComponent(value)}`)
            .then(res => res.json())
            .then(data => {
              if (data.username_exists) {
                userStatus.innerHTML = '<i class="fas fa-times-circle"></i> Username already taken';
                userStatus.className = "live-msg live-error";
              } else {
                userStatus.innerHTML = '<i class="fas fa-check-circle"></i> Username available';
                userStatus.className = "live-msg live-ok";
              }
            })
            .catch(() => {
              userStatus.innerText = "Checking availability...";
            });
        }, 500);
      });
    }

    if (phoneInput) {
      phoneInput.addEventListener("input", () => {
        clearTimeout(phoneTimer);
        phoneTimer = setTimeout(() => {
          const value = phoneInput.value.trim();
          if (value.length < 10) {
            phoneStatus.innerText = "";
            return;
          }

          fetch(`/check_user?phone=${encodeURIComponent(value)}`)
            .then(res => res.json())
            .then(data => {
              if (data.phone_exists) {
                phoneStatus.innerHTML = '<i class="fas fa-times-circle"></i> Mobile number already registered';
                phoneStatus.className = "live-msg live-error";
              } else {
                phoneStatus.innerHTML = '<i class="fas fa-check-circle"></i> Mobile number valid';
                phoneStatus.className = "live-msg live-ok";
              }
            })
            .catch(() => {
              phoneStatus.innerText = "Checking availability...";
            });
        }, 500);
      });
    }

    // Form submission with loading states
    const sendOtpForm = document.getElementById("sendOtpForm");
    const verifyOtpForm = document.getElementById("verifyOtpForm");
    const sendOtpBtn = document.getElementById("sendOtpBtn");
    const verifyBtn = document.getElementById("verifyBtn");

    if (sendOtpForm) {
      sendOtpForm.addEventListener("submit", function (e) {
        // Validate username and phone before submission
        const username = usernameInput?.value.trim();
        const phone = phoneInput?.value.trim();

        if (!username || username.length < 3) {
          e.preventDefault();
          if (userStatus) {
            userStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Username must be at least 3 characters';
            userStatus.className = "live-msg live-error";
          }
          return;
        }

        if (!phone || phone.length < 10) {
          e.preventDefault();
          if (phoneStatus) {
            phoneStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Valid mobile number required';
            phoneStatus.className = "live-msg live-error";
          }
          return;
        }

        if (sendOtpBtn) {
          sendOtpBtn.classList.add("loading");
          sendOtpBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending request...';
        }
      });
    }

    if (verifyOtpForm) {
      verifyOtpForm.addEventListener("submit", function (e) {
        const otpInput = this.querySelector('input[name="otp"]');
        const otp = otpInput?.value.trim();

        if (!otp || otp.length !== 6) {
          e.preventDefault();
          const errorDiv = document.createElement('div');
          errorDiv.className = 'message error';
          errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please enter a valid 6-digit OTP';
          this.parentNode.insertBefore(errorDiv, this.nextSibling);
          setTimeout(() => errorDiv.remove(), 3000);
          return;
        }

        if (verifyBtn) {
          verifyBtn.classList.add("loading");
          verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        }
      });
    }

    // Input focus effects
    const inputs = document.querySelectorAll('.input-group input');
    inputs.forEach(input => {
      input.addEventListener('focus', function () {
        this.parentElement.style.transform = 'translateX(5px)';
      });
      input.addEventListener('blur', function () {
        this.parentElement.style.transform = 'translateX(0)';
      });
    });

    // Initialize particles
    document.addEventListener('DOMContentLoaded', createParticles);

    // Auto-clear validation messages when typing
    if (usernameInput) {
      usernameInput.addEventListener('input', () => {
        if (userStatus && userStatus.classList.contains('live-error')) {
          userStatus.innerText = '';
        }
      });
    }

    if (phoneInput) {
      phoneInput.addEventListener('input', () => {
        if (phoneStatus && phoneStatus.classList.contains('live-error')) {
          phoneStatus.innerText = '';
        }
      });
    }
  </script>

</body>

</html>

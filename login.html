<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Nexus Energy | Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at 20% 30%, #93c09a, #7dc03e);
  overflow: hidden;
  position: relative;
}

/* Animated Background Grid */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    45deg,
    rgba(59, 201, 255, 0.08) 0px,
    rgba(59, 201, 255, 0.08) 2px,
    transparent 2px,
    transparent 30px
  );
  animation: electricMove 20s linear infinite;
  opacity: 0.5;
}

@keyframes electricMove {
  from { transform: translate(-10%, -10%) rotate(0deg); }
  to { transform: translate(10%, 10%) rotate(5deg); }
}

/* Floating Particles */
.particles {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 0;
}

.particle {
  position: absolute;
  background: rgba(59, 201, 255, 0.2);
  border-radius: 50%;
  animation: floatParticle 12s infinite ease-in-out;
}

@keyframes floatParticle {
  0%, 100% {
    transform: translateY(0) translateX(0);
    opacity: 0;
  }
  20% {
    opacity: 0.6;
  }
  80% {
    opacity: 0.3;
  }
  100% {
    transform: translateY(-100px) translateX(50px);
    opacity: 0;
  }
}

/* Login Box */
.login-box {
  position: relative;
  width: 400px;
  padding: 2.5rem;
  background: rgba(12, 22, 35, 0.85);
  backdrop-filter: blur(20px);
  border-radius: 2rem;
  border: 1px solid rgba(59, 201, 255, 0.4);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.3);
  z-index: 10;
  transition: all 0.3s ease;
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% {
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.3);
    border-color: rgba(59, 201, 255, 0.4);
  }
  50% {
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 255, 255, 0.6);
    border-color: rgba(59, 201, 255, 0.7);
  }
}

.login-box:hover {
  transform: translateY(-5px);
}

/* Logo/Brand */
.brand {
  text-align: center;
  margin-bottom: 2rem;
}

.brand i {
  font-size: 3rem;
  color: #3bc9ff;
  filter: drop-shadow(0 0 10px rgba(59, 201, 255, 0.5));
  animation: iconPulse 2s ease-in-out infinite;
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.brand h2 {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff, #9bd4ff);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
  margin-top: 0.5rem;
}

.brand p {
  font-size: 0.75rem;
  color: #8aadcf;
  margin-top: 0.3rem;
}

/* Form Groups */
.input-group {
  margin-bottom: 1.5rem;
}

.input-group input {
  width: 100%;
  padding: 0.9rem 1rem;
  border: 1px solid rgba(59, 201, 255, 0.3);
  outline: none;
  border-radius: 1rem;
  background: rgba(0, 0, 0, 0.5);
  color: #eef5ff;
  font-size: 1rem;
  transition: all 0.2s ease;
}

.input-group input:focus {
  border-color: #3bc9ff;
  box-shadow: 0 0 15px rgba(59, 201, 255, 0.3);
  background: rgba(0, 0, 0, 0.7);
}

.input-group input::placeholder {
  color: #6f9bcb;
}

/* Login Button */
.login-btn {
  width: 100%;
  padding: 0.9rem;
  border: none;
  border-radius: 3rem;
  background: linear-gradient(105deg, #0b2a42, #0a1a2c);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  border: 1px solid #3bc9ff;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 0.5rem;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(59, 201, 255, 0.4);
  border-color: #7ad6ff;
}

.login-btn:active {
  transform: translateY(0);
}

/* Register Link */
.register-link {
  text-align: center;
  margin-top: 1.2rem;
  font-size: 0.85rem;
  color: #8aadcf;
}

.register-link a {
  color: #3bc9ff;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s ease;
}

.register-link a:hover {
  text-decoration: underline;
  color: #7ad6ff;
}

/* Error Message */
.message {
  margin-top: 1.2rem;
  text-align: center;
  font-weight: 500;
  padding: 0.8rem;
  border-radius: 1rem;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.message.error {
  color: #ff7a5c;
  background: rgba(255, 70, 50, 0.15);
  border: 1px solid rgba(255, 70, 50, 0.4);
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

/* Loading Screen */
#loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(8, 18, 28, 0.95);
  backdrop-filter: blur(20px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  flex-direction: column;
}

.loader-box {
  text-align: center;
  color: #3bc9ff;
  animation: fadeInUp 0.5s ease;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.loader-circle {
  width: 80px;
  height: 80px;
  border: 3px solid rgba(59, 201, 255, 0.2);
  border-top: 3px solid #3bc9ff;
  border-right: 3px solid #3bc9ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1.5rem auto;
  box-shadow: 0 0 20px rgba(59, 201, 255, 0.3);
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text {
  letter-spacing: 2px;
  font-size: 1.2rem;
  font-weight: 600;
  background: linear-gradient(135deg, #ffffff, #9bd4ff);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

.loading-subtext {
  font-size: 0.75rem;
  color: #8aadcf;
  margin-top: 0.5rem;
}

/* Responsive */
@media (max-width: 480px) {
  .login-box {
    width: 90%;
    padding: 1.5rem;
  }
  .brand h2 {
    font-size: 1.5rem;
  }
  .brand i {
    font-size: 2.5rem;
  }
}

/* Spark Effect */
.spark {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #3bc9ff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  animation: sparkMove 1s ease-out forwards;
}

@keyframes sparkMove {
  0% {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-60px) scale(0);
    opacity: 0;
  }
}
</style>
</head>
<body>

<!-- Floating Particles Container -->
<div class="particles" id="particles"></div>

<div class="login-box">
  <div class="brand">
    <!-- <i class="fas fa-bolt"style="color: #70b9dd;"></i> -->
    <h2>⚡ POWER LOGIN </h2>
    <p>Electricity Demand Forecasting</p>
  </div>

  <form method="POST" id="loginForm">
    <div class="input-group">
      <input type="text" name="username" placeholder="Username" required autocomplete="off">
    </div>

    <div class="input-group">
      <input type="password" name="password" placeholder="Password" required>
    </div>

    <button type="submit" class="login-btn" id="loginBtn">
      <i class="fas fa-arrow-right-to-bracket"></i> CONNECT
    </button>
  </form>

  <div class="register-link">
    New user? <a href="/register">Create Account →</a>
  </div>

  {% if message %}
    <div class="message error">
      <i class="fas fa-exclamation-triangle"></i> {{ message }}
    </div>
  {% endif %}
</div>

<!-- Loading Overlay -->
<div id="loading-screen">
  <div class="loader-box">
    <div class="loader-circle"></div>
    <h2 class="loading-text">⚡ Authenticating...</h2>
    <p class="loading-subtext">Connecting to secure gateway</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script>
// Create floating particles
function createParticles() {
  const container = document.getElementById('particles');
  if (!container) return;
  
  for (let i = 0; i < 40; i++) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 4 + 1;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.top = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 15 + 's';
    particle.style.animationDuration = Math.random() * 12 + 8 + 's';
    container.appendChild(particle);
  }
}

// Spark effect on mouse move
let lastTime = 0;
document.addEventListener("mousemove", (e) => {
  const now = Date.now();
  if (now - lastTime < 30) return;
  lastTime = now;

  const spark = document.createElement("div");
  spark.className = "spark";
  spark.style.left = e.clientX + "px";
  spark.style.top = e.clientY + "px";
  
  const size = Math.random() * 6 + 2;
  spark.style.width = size + "px";
  spark.style.height = size + "px";
  spark.style.boxShadow = "0 0 10px rgba(59, 201, 255, 0.8), 0 0 20px rgba(59, 201, 255, 0.5)";
  
  document.body.appendChild(spark);
  setTimeout(() => spark.remove(), 800);
});

// Login form with loading animation
const form = document.getElementById("loginForm");
const loadingScreen = document.getElementById("loading-screen");
const loginBtn = document.getElementById("loginBtn");

if (form) {
  form.addEventListener("submit", function(e) {
    // Only show loading if there's no error message (prevents double loading on error)
    const errorMsg = document.querySelector('.message.error');
    if (!errorMsg || errorMsg.style.display === 'none') {
      e.preventDefault();
      
      // Add loading state to button
      if (loginBtn) {
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
        loginBtn.disabled = true;
      }
      
      // Show loading screen
      loadingScreen.style.display = "flex";
      
      // Submit after 1.5 seconds (shorter for better UX)
      setTimeout(() => {
        form.submit();
      }, 1500);
    }
  });
}

// If there's an error message, remove loading state
if (document.querySelector('.message.error')) {
  if (loginBtn) {
    loginBtn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> CONNECT';
    loginBtn.disabled = false;
  }
  loadingScreen.style.display = "none";
}

// Initialize particles
document.addEventListener('DOMContentLoaded', createParticles);

// Add input focus effects
const inputs = document.querySelectorAll('.input-group input');
inputs.forEach(input => {
  input.addEventListener('focus', function() {
    this.parentElement.style.transform = 'translateX(5px)';
  });
  input.addEventListener('blur', function() {
    this.parentElement.style.transform = 'translateX(0)';
  });
});

// Prevent multiple rapid form submissions
let isSubmitting = false;
form.addEventListener('submit', function(e) {
  if (isSubmitting) {
    e.preventDefault();
    return;
  }
  isSubmitting = true;
  setTimeout(() => { isSubmitting = false; }, 3000);
});
</script>

</body>
</html>

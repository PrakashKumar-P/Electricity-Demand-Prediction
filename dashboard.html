<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus Dashboard | Energy Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
        }

        /* Dashboard Header */
        .dashboard-header {
            background: rgba(8, 18, 28, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 201, 255, 0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo span {
            color: #3bc9ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            background: rgba(59, 201, 255, 0.1);
            padding: 0.4rem 1rem 0.4rem 1.2rem;
            border-radius: 2rem;
            border: 0.5px solid rgba(59, 201, 255, 0.3);
        }

        .user-info i {
            color: #3bc9ff;
            font-size: 1rem;
        }

        .user-name {
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: rgba(255, 70, 50, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            color: #ff9e85;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logout-btn:hover {
            background: rgba(255, 70, 50, 0.3);
            transform: translateY(-1px);
        }

        /* Dashboard Wrapper */
        .dashboard-wrapper {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Graph Container */
        .graph-container {
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.2);
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
            margin-top: 100px;
        }

        .graph-container:hover {
            border-color: rgba(59, 201, 255, 0.4);
            box-shadow: 0 0 20px rgba(59, 201, 255, 0.1);
        }

        canvas#trendChart {
            max-height: 420px;
            width: 100%;
        }

        /* Overlay Card */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .overlay-card {
            pointer-events: auto;
            background: rgba(18, 28, 40, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 20px 40px rgba(34, 33, 33, 0.5), 0 0 20px rgba(79, 223, 255, 0.2);
            transition: transform 0.25s ease, box-shadow 0.3s;
            max-width: 420px;
            width: 85%;
           
        }

        .overlay-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 28px 45px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 210, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.6);
        }

        .welcome-icon {
            font-size: 2.5rem;
            color: #3bc9ff;
            margin-bottom: 0.5rem;
        }

        .overlay-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #9dd9ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .greeting-sub {
            font-size: 0.85rem;
            color: #a0c4e8;
            margin-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(100, 200, 255, 0.3);
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        /* Button Row */
        .btn-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1.2rem 0;
        }

        .btn-row a {
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(105deg, #0a1a2a, #07121f);
            border: 1px solid rgba(0, 210, 255, 0.5);
            padding: 0.7rem 1.5rem;
            border-radius: 3rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #eef5ff;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary i {
            color: #3bc9ff;
        }

        .btn-primary:hover {
            background: linear-gradient(105deg, #0f2338, #0a1625);
            border-color: #3bc9ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 160, 255, 0.2);
        }

        /* Navigation Links */
        .nav-links {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .nav-link {
            color: #7fb4da;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .nav-link:hover {
            background: rgba(59, 201, 255, 0.15);
            color: #3bc9ff;
            transform: translateY(-1px);
        }

        .status-badge {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #5b8ab5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-wrapper {
                padding: 0 1rem;
                margin: 1rem auto;
            }
            .graph-container {
                padding: 1rem;
            }
            .overlay-card {
                padding: 1.2rem;
                width: 90%;
            }
            .overlay-card h2 {
                font-size: 1.3rem;
            }
            .dashboard-header {
                padding: 0.8rem 1rem;
            }
            .btn-primary {
                padding: 0.5rem 1rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-header">
    <div class="logo">
        <i class="fas fa-bolt" style="color: #3bc9ff; font-size: 1.5rem;"></i>
        <h2><span>Nexus Energy</span></h2>
    </div>
    <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span class="user-name">{{ username }}</span>
        <a href="/logout" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<div class="dashboard-wrapper">
    <div class="graph-container">
        <canvas id="trendChart"
            data-months='{{ months | tojson | safe }}'
            data-values='{{ values | tojson | safe }}'>
        </canvas>
        
        <!-- CENTER OVERLAY - Shows Welcome with Username -->
        <div class="overlay">
            <div class="overlay-card">
                <div class="welcome-icon">
                    <i class="fas fa-bolt" style="color: #70b9dd;"></i>
                </div>
                <h2>Welcome {{ username }}!</h2>
                <div class="btn-row">
                    <a href="/forecast">
                        <button class="btn-primary">
                            <i class="fas fa-chart-simple"></i> Predict Electricity Demand
                        </button>
                    </a>
                    <a href="/anomalies">
                        <button class="btn-primary">
                            <i class="fas fa-exclamation-triangle"></i> Anomaly Detection
                        </button>
                    </a>
                </div>
            
            </div>
        </div>
    </div>
</div>

<!-- Chart Script -->
<script>
    const canvas = document.getElementById("trendChart");
    
    if (canvas) {
        let months = [];
        let values = [];
        
        try {
            months = JSON.parse(canvas.dataset.months || '[]');
            values = JSON.parse(canvas.dataset.values || '[]');
        } catch(e) {
            console.warn("Chart data parse error:", e);
            months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
            values = [100, 120, 140, 160, 180, 200];
        }
        
        if (months.length > 0 && values.length > 0) {
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 201, 255, 0.25)');
            gradient.addColorStop(0.7, 'rgba(59, 201, 255, 0.05)');
            gradient.addColorStop(1, 'rgba(59, 201, 255, 0.02)');
            
            new Chart(ctx, {
                type: "line",
                data: {
                    labels: months,
                    datasets: [{
                        data: values,
                        borderColor: "#00ffff",
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointHoverRadius: 7,
                        pointBackgroundColor: "#0e2a3a",
                        pointBorderColor: "#7ad0ff",
                        pointBorderWidth: 2,
                        pointHoverBackgroundColor: "#ffffff",
                        pointHoverBorderColor: "#2dd4ff"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(8, 18, 28, 0.9)',
                            titleColor: '#c0e4ff',
                            bodyColor: '#ccdeff',
                            borderColor: '#2dd4ff',
                            borderWidth: 1,
                            cornerRadius: 10,
                            callbacks: {
                                label: function(context) {
                                    return `📊 Demand: ${context.raw.toLocaleString()} units`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(80, 140, 180, 0.12)' },
                            ticks: { color: '#b3deff', font: { size: 11 } }
                        },
                        y: {
                            grid: { color: 'rgba(70, 150, 200, 0.1)' },
                            ticks: { color: '#b0d4ff', font: { size: 11 } }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }
    }
</script>

</body>
</html>
